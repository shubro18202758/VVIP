# VVIP Convoy Orchestration Platform — Production Compose
# Hardware-aware deployment for Legion 7i (i9-13900HX / RTX 4070 8GB / 32GB RAM)
#
# CPU Core Allocation (24 threads total):
#   Cores  0-3:  signal-ingress (Stream Processor — latency-sensitive)
#   Cores  4-7:  traffic-oracle (ML inference — ONNX, sklearn, OR-Tools)
#   Cores  8-11: postgis (pgRouting/pgvector — CPU-bound spatial)
#   Cores 12-15: convoy-brain (agentic orchestration, Ollama CPU fallback)
#   Cores 16-23: OS kernel, NATS, Valkey, command-deck, observability
#
# GPU Context Isolation:
#   Ollama runs on HOST (native GPU access) — 5632 MB VRAM
#   traffic-oracle ONNX: NVIDIA Container Toolkit passthrough — 409 MB VRAM
#   All other services: ZERO GPU access
#
# Memory Budget (32 GB system RAM):
#   PostGIS:        2 GB (hard limit, shared_buffers=512MB)
#   traffic-oracle: 4 GB (hard limit, MemoryGuard @ 3500 MB)
#   convoy-brain:   2 GB (hard limit)
#   signal-ingress: 512 MB (hard limit)
#   command-deck:   256 MB (hard limit)
#   Valkey:         640 MB (512 MB maxmemory + overhead)
#   NATS:           512 MB (256 MB store + overhead)
#   Prometheus:     512 MB
#   Grafana:        256 MB
#   node-exporter:  64 MB
#   TOTAL:          ~10.7 GB → leaves ~21 GB for Ollama + OS + headroom

services:
  # ─── Storage Layer ───────────────────────────────────────────────
  postgis:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.postgis
    container_name: vvip-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: corridor_db
      POSTGRES_USER: corridor_admin
      POSTGRES_PASSWORD: ${POSTGIS_PASSWORD:-dev_changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./services/corridor-store/migrations:/docker-entrypoint-initdb.d
      - ./services/corridor-store/config/postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corridor_admin -d corridor_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2G
        reservations:
          cpus: "2.0"
          memory: 512M
    cpuset: "8-11"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  valkey:
    image: valkey/valkey:8-alpine
    container_name: vvip-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: >
      valkey-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lfu
      --save 60 1000
      --io-threads 2
      --io-threads-do-reads yes
      --tcp-backlog 511
      --hz 100
      --activedefrag yes
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 640M
        reservations:
          memory: 256M
    cpuset: "16-17"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  nats:
    image: nats:2-alpine
    container_name: vvip-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command: >
      --js
      --store_dir /data
      --max_mem_store 256MB
      --max_payload 8MB
      --max_pending 64MB
      --write_deadline 10s
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "nats", "-s", "nats://localhost:4222", "server", "check", "connection"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          memory: 128M
    cpuset: "18-19"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ─── Data Integration (Rust Stream Processor) ──────────────────
  signal-ingress:
    build:
      context: ./services/signal-ingress
      dockerfile: ../../infra/docker/Dockerfile.signal-ingress
    container_name: vvip-signal-ingress
    restart: unless-stopped
    environment:
      NATS_URL: nats://nats:4222
      RUST_LOG: info
    depends_on:
      nats:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 512M
        reservations:
          cpus: "2.0"
          memory: 128M
    cpuset: "0-3"
    # Pin the Stream Processor to P-cores for max single-thread perf
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ─── ML / Optimization (ONNX + sklearn + OR-Tools) ────────────
  traffic-oracle:
    build:
      context: ./services/traffic-oracle
      dockerfile: ../../infra/docker/Dockerfile.traffic-oracle
    container_name: vvip-traffic-oracle
    restart: unless-stopped
    environment:
      VVIP_DATABASE_URL: postgresql://corridor_admin:${POSTGIS_PASSWORD:-dev_changeme}@postgis:5432/corridor_db
      VVIP_VALKEY_URL: redis://valkey:6379
      VVIP_NATS_URL: nats://nats:4222
      VVIP_ML_THREADS: "4"
      VVIP_ML_INTEROP_THREADS: "2"
      VVIP_MEMORY_GUARD_MB: "3500"
      # Thread pinning for BLAS/numpy/torch
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
      OPENBLAS_NUM_THREADS: "4"
      NUMEXPR_NUM_THREADS: "4"
      # CUDA device visibility — traffic-oracle gets GPU #0 for ONNX
      NVIDIA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # ONNX Runtime tuning
      ORT_GLOBAL_THREAD_POOL_SIZE: "4"
    ports:
      - "8081:8081"
    depends_on:
      postgis:
        condition: service_healthy
      valkey:
        condition: service_healthy
      nats:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "2.0"
          memory: 1G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    cpuset: "4-7"
    shm_size: "256m"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ─── Agentic Orchestration ──────────────────────────────────────
  convoy-brain:
    build:
      context: ./services/convoy-brain
      dockerfile: ../../infra/docker/Dockerfile.convoy-brain
    container_name: vvip-convoy-brain
    restart: unless-stopped
    environment:
      VVIP_DATABASE_URL: postgresql://corridor_admin:${POSTGIS_PASSWORD:-dev_changeme}@postgis:5432/corridor_db
      VVIP_VALKEY_URL: redis://valkey:6379
      VVIP_NATS_URL: nats://nats:4222
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      TRAFFIC_ORACLE_URL: http://traffic-oracle:8081
      PORT: "8080"
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgis:
        condition: service_healthy
      valkey:
        condition: service_healthy
      traffic-oracle:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 512M
    cpuset: "12-15"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ─── Presentation (SvelteKit Dashboard) ─────────────────────────
  command-deck:
    build:
      context: ./services/command-deck
      dockerfile: ../../infra/docker/Dockerfile.command-deck
    container_name: vvip-command-deck
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      convoy-brain:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 256M
        reservations:
          memory: 64M
    cpuset: "20-21"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  # ─── Observability Stack ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: vvip-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=2GB"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    cpuset: "22"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "2"

  grafana:
    image: grafana/grafana:11.5.2
    container_name: vvip-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-vvip_admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/vvip-overview.json
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    cpuset: "23"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  nvidia-exporter:
    image: utkuozdemir/nvidia_gpu_exporter:1.3.0
    container_name: vvip-nvidia-exporter
    restart: unless-stopped
    ports:
      - "9835:9835"
    volumes:
      - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M

volumes:
  postgis_data:
  valkey_data:
  nats_data:
  prometheus_data:
  grafana_data:

# Network isolation: all services on single bridge network
# GPU services explicitly declared; non-GPU services have no device access
networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: vvip-br0
