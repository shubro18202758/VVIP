# postgresql.conf — Edge-tuned for VVIP corridor platform
# Target hardware: RTX 4070 system (16-32GB system RAM, NVMe SSD)
# All PostGIS / pgRouting / pgvector work runs on CPU — zero VRAM.

# ---------------------------------------------------------------------------
# Memory
# ---------------------------------------------------------------------------
shared_buffers = 512MB
work_mem = 64MB
maintenance_work_mem = 256MB
effective_cache_size = 1GB
huge_pages = try

# ---------------------------------------------------------------------------
# Parallelism
# ---------------------------------------------------------------------------
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_worker_processes = 8
parallel_tuple_cost = 0.01
parallel_setup_cost = 100

# ---------------------------------------------------------------------------
# Planner — SSD-optimized
# ---------------------------------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200
seq_page_cost = 1.0

# ---------------------------------------------------------------------------
# WAL / Durability — tuned for edge (single-node, acceptible data loss window)
# ---------------------------------------------------------------------------
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 80MB

# ---------------------------------------------------------------------------
# Connections
# ---------------------------------------------------------------------------
max_connections = 100
listen_addresses = '*'

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_min_duration_statement = 500
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0

# ---------------------------------------------------------------------------
# Spatial / Vector tuning
# ---------------------------------------------------------------------------
# pgvector HNSW build uses maintenance_work_mem (256MB above)
# pgRouting shortest-path queries benefit from work_mem (64MB above)
