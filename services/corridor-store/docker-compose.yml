# Corridor Store — Storage Layer
# PostGIS 3.5+ (spatial), Valkey 8 (real-time state cache), NATS (message bus)
# All services run as containers — no VRAM consumed by this layer.

services:
  postgis:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.postgis
    container_name: corridor-postgis
    environment:
      POSTGRES_DB: corridor_db
      POSTGRES_USER: corridor_admin
      POSTGRES_PASSWORD: ${POSTGIS_PASSWORD:-dev_changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corridor_admin -d corridor_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  valkey:
    image: valkey/valkey:8-alpine
    container_name: corridor-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: >
      valkey-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lfu
      --save 60 1000
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: corridor-nats
    ports:
      - "4222:4222"   # Client
      - "8222:8222"   # Monitoring
    command: >
      --js
      --store_dir /data
      --max_mem_store 256MB
    volumes:
      - nats_data:/data

volumes:
  postgis_data:
  valkey_data:
  nats_data:
