# ─────────────────────────────────────────────────────────────────────────────
# VVIP Convoy Orchestration Agent — Fine-Tuning Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Target: Qwen 3.5 9B → specialized VVIP agent on RTX 4070 (8 GB VRAM)
# Pipeline: Continuous Pre-Training (CPT) → SFT → GRPO
# Library: Unsloth (2x faster, 60% less VRAM via kernel-level optimizations)
# ─────────────────────────────────────────────────────────────────────────────

# -- Base Model ---------------------------------------------------------------
model:
  name: "unsloth/Qwen3.5-9B-bnb-4bit"       # Pre-quantized INT4 from Unsloth hub
  fallback: "Qwen/Qwen3.5-9B"               # If pre-quantized unavailable
  max_seq_length: 4096                        # Keep short for 8 GB VRAM
  dtype: null                                 # Auto-detect (bfloat16 on Ampere+)
  load_in_4bit: true                          # Mandatory for 8 GB VRAM

# -- LoRA Configuration -------------------------------------------------------
#
# Mathematical Rationale for Hyperparameters:
#
# rank (r=32):
#   The low-rank decomposition factorizes each target weight W ∈ R^{d×k} into
#   W + ΔW where ΔW = B·A, B ∈ R^{d×r}, A ∈ R^{r×k}. The trainable parameter
#   count per layer = r*(d+k) instead of d*k. For Qwen 3.5 9B with d=k=3584:
#     Full: 3584² = 12.8M params/layer
#     LoRA r=32: 32*(3584+3584) = 229K params/layer → 56x compression
#   r=32 is the sweet spot: r=16 underperforms on multi-tool reasoning tasks;
#   r=64 doubles memory with <2% quality gain (Hu et al., 2022).
#
# alpha (α=64, ratio α/r = 2.0):
#   The effective learning rate for LoRA is scaled by α/r. With α=64, r=32:
#     ΔW_effective = (α/r) · B·A = 2.0 · B·A
#   This 2x scaling amplifies gradient signal to compensate for the low-rank
#   constraint, ensuring the adapter converges in fewer steps. The ratio α/r=2.0
#   follows the empirical finding (Dettmers et al., QLoRA, 2023) that doubling
#   the scaling factor relative to rank prevents underfitting on instruction-
#   following tasks without causing instability.
#
# target_modules:
#   We target ONLY q_proj (query) and v_proj (value) attention projections:
#   - q_proj: Controls "what to attend to" — critical for spatial reasoning
#     (segment adjacency, route topology) and MCP argument extraction.
#   - v_proj: Controls "what information to extract" — critical for numerical
#     reasoning (congestion indices, speed predictions, queue lengths).
#   - k_proj/o_proj EXCLUDED: Key projections are less sensitive to fine-tuning
#     (Aghajanyan et al., 2021). Output projections add 30% VRAM for <5% gain.
#   - MLP layers EXCLUDED: Feed-forward networks store factual knowledge that
#     we want to PRESERVE from pre-training, not overwrite.
#   VRAM savings: targeting 2/6 attention modules reduces adapter memory by 67%.
#
lora:
  rank: 32
  alpha: 64                                   # α/r = 2.0 (see rationale above)
  target_modules:
    - "q_proj"
    - "v_proj"
  dropout: 0.05                               # Regularization against overfitting
  bias: "none"                                # No bias adaptation (saves memory)
  use_rslora: true                            # Rank-Stabilized LoRA: scales by 1/√r
                                              # instead of 1/r, preventing gradient
                                              # collapse at higher ranks

# -- Phase 1: Continuous Pre-Training (CPT) -----------------------------------
# Purpose: Inject domain vocabulary (segment IDs, road classes, Delhi geography,
#          VVIP protocols) into the model's latent space before instruction tuning.
cpt:
  enabled: true
  dataset_path: "models/finetune/data/cpt_corpus.jsonl"
  num_epochs: 2
  batch_size: 1                               # Single-sample due to VRAM
  gradient_accumulation_steps: 8              # Effective batch = 8
  learning_rate: 5.0e-5                       # Conservative for pre-training
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  max_seq_length: 2048                        # Shorter for dense domain text
  weight_decay: 0.01
  logging_steps: 10
  save_steps: 100
  output_dir: "models/finetune/checkpoints/cpt"

# -- Phase 2: Supervised Fine-Tuning (SFT) ------------------------------------
# Purpose: Teach the model the exact ChatML conversation format, tool-calling
#          syntax, and structured JSON output generation.
sft:
  enabled: true
  dataset_path: "models/finetune/data/sft_conversations.jsonl"
  num_epochs: 3
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5                       # Lower than CPT (adapter already warm)
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  max_seq_length: 4096                        # Full context for multi-turn
  weight_decay: 0.01
  logging_steps: 10
  save_steps: 50
  output_dir: "models/finetune/checkpoints/sft"
  packing: true                               # Pack short examples to fill context

# -- Phase 3: GRPO (Group Relative Policy Optimization) -----------------------
# Purpose: Enhance deliberative reasoning via RL. GRPO generates G completions
#          per prompt, scores them with a reward function, and updates the policy
#          using the group-relative advantage (no separate critic/value model).
#
# Why GRPO over PPO/DPO:
#   - PPO requires a value model (doubles VRAM) — impossible on 8 GB.
#   - DPO requires ranked preference pairs — hard to generate for tool-calling.
#   - GRPO uses group-internal normalization: advantage_i = (r_i - mean(r)) / std(r)
#     This eliminates the critic while maintaining stable gradients.
grpo:
  enabled: true
  dataset_path: "models/finetune/data/grpo_prompts.jsonl"
  num_epochs: 1                               # Single pass (RL is sensitive)
  batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-6                       # Very conservative for RL
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1                           # Longer warmup for stability
  max_seq_length: 4096
  max_completion_length: 2048                 # Max tokens per completion
  num_generations: 4                          # G=4 completions per prompt
  beta: 0.04                                  # KL penalty coefficient
                                              # Controls divergence from SFT policy
                                              # 0.04 balances exploration vs stability
  temperature: 0.7                            # Sampling temperature for generations
  output_dir: "models/finetune/checkpoints/grpo"
  logging_steps: 5
  save_steps: 25

  # Reward function weights (used by the reward_fn in training script)
  reward:
    tool_call_valid_json: 3.0                 # Syntactically valid JSON tool call
    tool_name_correct: 2.0                    # Tool name exists in MCP schema
    tool_args_schema_match: 3.0               # Arguments match schema types
    reasoning_present: 1.0                    # Has explicit reasoning chain
    reasoning_data_grounded: 2.0              # Reasoning references tool results
    confidence_calibrated: 1.0                # Confidence matches data coverage
    no_hallucinated_data: 5.0                 # Penalty for fabricated numbers
    correct_final_answer: 3.0                 # Ground-truth answer match
    spatial_reasoning_correct: 2.0            # Correct spatial/graph reasoning
    security_protocol_followed: 2.0           # VVIP class constraints obeyed

# -- Memory Optimization (Critical for 8 GB VRAM) -----------------------------
memory:
  gradient_checkpointing: true                # Recompute activations in backward pass
                                              # Trades ~30% speed for ~60% VRAM savings
  gradient_checkpointing_method: "unsloth"    # Unsloth's optimized checkpointing
                                              # (30% faster than HF default via
                                              # selective layer checkpointing)
  optimizer: "adamw_8bit"                     # 8-bit AdamW (bitsandbytes)
                                              # Reduces optimizer state from 8 bytes/param
                                              # to 2 bytes/param. For 229K trainable params:
                                              # Full AdamW: 229K * 8 = 1.83 MB
                                              # 8-bit: 229K * 2 = 0.46 MB
  offload_optimizer_to_cpu: false             # Not needed with 8-bit optimizer
                                              # and small trainable param count
  max_grad_norm: 1.0                          # Gradient clipping for stability
  fp16: false                                 # Use bf16 instead (better numerics)
  bf16: true                                  # RTX 4070 (Ada) natively supports bf16
  tf32: true                                  # TF32 for matmul acceleration on Ampere+

# -- GGUF Export ---------------------------------------------------------------
export:
  merge_adapter: true                         # Merge LoRA weights into base model
  quantization_method: "q4_k_m"               # Match existing Ollama deployment
  output_dir: "models/finetune/output"
  modelfile_template: "models/Modelfile.qwen_vvip"  # Reuse existing system prompt
  ollama_model_name: "qwen_vvip:9b-sft-grpo"
